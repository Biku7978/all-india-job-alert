<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhadra Group Recruitment</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .job-img { width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .apply-box { background: #eef6ff; padding: 20px; border-radius: 8px; text-align: center; }
        .email-link { display: inline-block; background: #0056b3; color: white; padding: 12px 25px; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="bhadra_poster.png" alt="Bhadra Group Hiring" class="job-img">
    
    <div class="apply-box">
        <h3>How to Apply?</h3>
        <p>Interested candidates can send their CV to the HR email address below:</p>
        <a href="mailto:HR@BhadraGroup.com" class="email-link">Email: HR@BhadraGroup.com</a>
    </div>
</div>

</body>
</html>
