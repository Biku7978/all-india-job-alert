<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All India Job Alert</title>

    <!-- Google AdSense Code -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5447514271969241" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            padding-bottom: 80px;
        }

        header {
            background-color: #0056b3;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            max-width: 650px;
            margin: auto;
            background: white;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Poster Image Container */
        .poster-container {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }

        .poster-container img {
            width: 100%;
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        /* Social Media Join Buttons */
        .join-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 15px;
            background-color: #fff;
        }

        .join-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .join-info img {
            width: 30px;
            height: 30px;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-telegram {
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Text & Headings */
        .job-title-text {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            margin-top: 20px;
            padding: 10px 5px;
            border-top: 1px solid #eee;
        }

        .job-link {
            color: #0088cc;
            text-decoration: none;
            border-bottom: 1px dashed #0088cc;
        }

        .resume-btn {
            display: inline-block;
            background-color: #0056b3;
            color: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            margin-top: 5px;
        }

        footer {
            background-color: #0056b3;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        All India Job Alert
    </header>

    <div class="container">
        
        <!-- 1. Job Poster Section -->
        <div class="poster-container">
            <!-- Jo poster maine banakar diya, uska link yahan dal sakte hain -->
            <img src="https://via.placeholder.com/600x600.png?text=Skyline+Contracting+Co.+Recruitment" alt="Job Poster">
        </div>

        <!-- 2. WhatsApp Group Button -->
        <div class="join-box">
            <div class="join-info">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
                <span>WhatsApp Group</span>
            </div>
            <a href="https://whatsapp.com/channel/0029Vb78g62G3R3p4gXWpi3c" target="_blank" class="btn-whatsapp">🟢 Join Now</a>
        </div>

        <!-- 3. Telegram Group Button -->
        <div class="join-box">
            <div class="join-info">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
                <span>Telegram Group</span>
            </div>
            <a href="#" target="_blank" class="btn-telegram">🔵 Join Now</a>
        </div>

        <!-- 4. Job Details Text & Links -->
        <div class="job-title-text">
            <p>
                Skyline Contracting <a href="#" class="job-link">Recruitment</a> 2026 | 
                B.E/B.Tech <a href="#" class="job-link">Civil</a>, Mechanical & MEP <a href="#" class="job-link">Jobs</a>
            </p>
            <a href="mailto:joseph.fernandes@runwal.com" class="resume-btn">📇 Resume builder</a>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 All India Job Alert. All Rights Reserved.</p>
    </footer>

</body>
</html>
