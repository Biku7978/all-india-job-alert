<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All India Job Alert</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .job-card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .job-card img { width: 100%; height: auto; display: block; }
        .info { padding: 15px; }
        h3 { color: #0056b3; margin: 0 0 10px 0; }
        .btn { display: block; background: #0056b3; color: white; padding: 12px; text-decoration: none; border-radius: 6px; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">Latest Job Alerts</h2>

    <!-- Lloyds Job Card -->
    <div class="job-card">
        <img src="lloyds_poster.png" alt="Lloyds Jobs"> <!-- Yaha apni file ka naam dalein -->
        <div class="info">
            <h3>Lloyds Engineering Works</h3>
            <p>Urgent hiring for Construction Contracting Division. Multiple positions available.</p>
            <a href="lloyds.html" class="btn">View Details & Apply</a>
        </div>
    </div>

    <!-- Runwal Job Card -->
    <div class="job-card">
        <img src="runwal_poster.png" alt="Runwal Jobs"> <!-- Yaha apni file ka naam dalein -->
        <div class="info">
            <h3>Runwal Realty Recruitment</h3>
            <p>Hiring Junior & Senior Engineers for high-rise residential projects.</p>
            <a href="runwal.html" class="btn">View Details & Apply</a>
        </div>
    </div>

</div>
</body>
</html>
