<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All India Job Alert</title>
    <style>
        /* Premium Background Gradient */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 500px; margin: auto; }
        
        /* Glassmorphism Effect for Cards */
        .job-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 16px; 
            overflow: hidden; 
            margin-bottom: 25px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .job-card img { width: 100%; height: auto; display: block; }
        .info { padding: 20px; }
        h3 { color: #0056b3; margin: 0 0 10px 0; font-size: 20px; }
        .btn { 
            display: block; 
            background: #0056b3; 
            color: white; 
            padding: 14px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            text-align: center; 
            margin-top: 15px; 
            transition: background 0.3s;
        }
        .btn:hover { background: #004494; }
        h2 { color: white; text-align: center; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <h2>Latest Job Alerts</h2>

    <!-- Lloyds Job -->
    <div class="job-card">
        <img src="lloyds_poster.png" alt="Lloyds Jobs">
        <div class="info">
            <h3>Lloyds Engineering Works</h3>
            <p>Urgent hiring for Construction Contracting Division. Multiple positions available.</p>
            <a href="lloyds.html" class="btn">View Details & Apply</a>
        </div>
    </div>

    <!-- Runwal Job -->
    <div class="job-card">
        <img src="runwal_poster.png" alt="Runwal Jobs">
        <div class="info">
            <h3>Runwal Realty Recruitment</h3>
            <p>Hiring Junior & Senior Engineers for high-rise residential projects.</p>
            <a href="runwal.html" class="btn">View Details & Apply</a>
        </div>
    </div>

</div>
</body>
</html>
