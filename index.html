<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All India Job Alert</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; color: white; }
        .container { max-width: 500px; margin: auto; text-align: center; }
        
        .channel-logo { width: 100px; height: 100px; background: white; border-radius: 50%; margin-bottom: 15px; border: 4px solid #fff; object-fit: cover; }
        
        .job-card { background: rgba(255, 255, 255, 0.98); border-radius: 16px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); color: #333; text-align: left; }
        .job-card img { width: 100%; height: auto; display: block; }
        .info { padding: 20px; }
        h3 { color: #0056b3; margin: 0 0 10px 0; font-size: 20px; }
        .btn { display: block; background: #0056b3; color: white; padding: 14px; text-decoration: none; border-radius: 8px; font-weight: bold; text-align: center; margin-top: 15px; }
        
        .social-box { display: flex; gap: 15px; margin-top: 20px; }
        .social-btn { flex: 1; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; text-align: center; color: white; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .wa-btn { background: #25D366; }
        .tg-btn { background: #0088cc; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Channel Logo" class="channel-logo">
    <h1>All India Job Alert</h1>

    <!-- Lloyds Job Card -->
    <div class="job-card">
        <img src="lloyds_poster.png" alt="Lloyds Jobs">
        <div class="info">
            <h3>Lloyds Engineering Works</h3>
            <p>Urgent hiring for Construction Contracting Division. Click below to apply.</p>
            <a href="lloyds.html" class="btn">View Details & Apply</a>
        </div>
    </div>

    <!-- Runwal Job Card -->
    <div class="job-card">
        <img src="runwal_poster.png" alt="Runwal Jobs">
        <div class="info">
            <h3>Runwal Realty Recruitment</h3>
            <p>Hiring Junior & Senior Engineers for high-rise residential projects.</p>
            <a href="runwal.html" class="btn">View Details & Apply</a>
        </div>
    </div>

    <!-- Social Join Buttons -->
    <div class="social-box">
        <a href="https://whatsapp.com/channel/0029Vb78g62G3R3p4gXWpi3c" class="social-btn wa-btn" target="_blank">WhatsApp Channel</a>
        <a href="https://t.me/privatejobvacanci" class="social-btn tg-btn" target="_blank">Telegram Channel</a>
    </div>
</div>

</body>
</html>
